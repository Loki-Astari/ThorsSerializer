    Build_on_Windows:
        runs-on:    windows-latest
        steps:
            - uses: actions/checkout@master
            - run:  git config --global core.autocrlf input
            - run:  git clone https://github.com/Neargye/magic_enum.git /tmp/magic_enum
            - uses: actions/checkout@master
            - name: Install Cygwin
              uses: cygwin/cygwin-install-action@master
              with:
                packages: >-
                    autoconf
                    automake
                    make
                    gperf
                    gconfr
                    coreutils
                    mingw64-x86_64-gcc-g++
                    mingw64-x86_64-yaml
                    mingw64-x86_64-boost
                    mingw64-x86_64-dlfcn
            - name:  Run Configuration
              shell: bash
              run:   ./configure --enable-dark-mode --disable-vera --with-magicenumroot=/tmp/magic_enum --with-yamlroot=/usr/x86_64-w64-mingw32/sys-root/mingw/
            - name:  Build
              shell: bash
              run:   make

name: GitHub-CI for ci-test

run-name:   ${{ github.actor }} is learning
on:         [push]

#on:
#  push:
#    branches: [ master ]
#  pull_request:
#    branches: [ master ]

jobs:
  build:
    strategy:
      fail-fast: false          # don't abort other jobs if a job fails
      matrix:
        config:
#          - {
#              name:     "Ubuntu Linux",
#              os:       ubuntu-latest,
#              shell:    bash,
#              cc:       gcc,
#              cxx:      g++,
#              ar:       ar,
#            }
#          - {
#              name:     "MacOS",
#              os:       macos-latest,
#              shell:    bash,
#              cc:       gcc,
#              cxx:      g++,
#              ar:       ar,
#              magic_enum:   --with-magicenumroot=/tmp/magic_enum,
#            }
          - {
              name:         "Windows 64-bit",
              os:           windows-latest,
              shellold:     'msys2 {0}',
              shell:        bash,
              cc:           x86_64-w64-mingw32-gcc.exe,
              cxx:          x86_64-w64-mingw32-g++.exe,
              ar:           x86_64-w64-mingw32-gcc-ar.exe,
              msystem:      mingw64,
              vera:         --disable-vera,
              yaml:         --with-yamlroot=/d/a/_temp/msys64/mingw64/,
              magic_enum:   --with-magicenumroot=/tmp/magic_enum,
              cov:          COV=gcov,
              path:         '/d/a/_temp/msys64/mingw64/bin:/d/a/_temp/msys64/bin',
            }
    name:    ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    defaults:
      run:
        shell:  ${{ matrix.config.shell }}
    env:
      CC:   ${{ matrix.config.cc }}
      CXX:  ${{ matrix.config.cxx }}
      AR:   ${{ matrix.config.ar }}
      MSYS: "winsymlinks:nativestrict"

    steps:
    - if: matrix.config.os == 'ubuntu-latest'
      name: Install build dependencies (Linux)
      run: |
        sudo apt-get install vera++
        sudo apt-get install libboost-all-dev
        sudo apt-get install libyaml-dev
    - if: matrix.config.os == 'macos-latest'
      name: Install build dependencies (macOS)
      run: |
        export HOMEBREW_NO_AUTO_UPDATE=1
        brew install vera++
        brew install boost
        brew install libyaml
        brew install magic_enum
    - if: matrix.config.os == 'windows-latest'
      name: Install build dependencies (Windows)
      uses: msys2/setup-msys2@v2
      with:
        update: false
        msystem: ${{ matrix.config.msystem }}
        install: >-
          bash
          gperf
          git
          make
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-binutils
          mingw-w64-x86_64-libyaml
          mingw-w64-x86_64-boost
          mingw-w64-x86_64-dlfcn
          mingw-w64-x86_64-vera++
    - uses: actions/checkout@master
    - name: Build
      run: |
        echo
        echo
        export PATH="${{ matrix.config.path }}:${PATH}"
        uname -s | sed 's/-.*//'
        echo
        echo
        git clone https://github.com/Neargye/magic_enum.git /tmp/magic_enum
        ${{ matrix.config.cov }} ./configure --enable-dark-mode ${{ matrix.config.magic_enum }} ${{ matrix.config.yaml }} ${{ matrix.config.vera }}
        make
        sudo make install

